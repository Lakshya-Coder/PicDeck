<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiDeck</title>
    <meta name="description" content="Dashboard for your Raspberry Pi services">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <script type="module" src="app.js" defer></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>

<body>
    <div class="background-animation"></div>
    <main class="container">
        <header class="header">
            <div class="logo-wrapper">
                <div class="pulse-ring"></div>
                <!-- Using an elegant minimalist Pi logo or icon -->
                <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </div>
            <h1 id="main-title">--</h1>
            <div class="status-badge">
                <span class="status-indicator" id="status-dot"></span>
                <p class="ip-address">IP: <strong id="ip">Fetching...</strong></p>
                <div class="badge-divider"></div>
                <p class="timestamp">Updated: <strong id="timestamp">--</strong></p>
            </div>
            <div class="ssh-command-box" id="ssh-box" style="display: none;">
                <code>ssh&nbsp;<input type="text" id="ssh-user" value="lsk" title="Edit username">@<span id="ssh-ip">...</span></code>
                <button id="copy-ssh-btn" title="Copy to clipboard">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
        </header>

        <section class="services-card">
            <div class="services-header">
                <h2 class="services-title">Available Services</h2>
                <button id="add-service-btn" class="add-btn">+ Add Service</button>
            </div>
            <div id="buttons" class="buttons-grid">
                <!-- Buttons will be dynamically injected here -->
            </div>
        </section>
    </main>

    <!-- Add/Edit Service Modal -->
    <div id="add-service-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Add New Service</h2>
            <form id="add-service-form">
                <div class="form-group" style="position: relative;">
                    <label for="service-icon">Icon (Emoji)</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="text" id="service-icon" required placeholder="e.g. 🌐" style="flex: 1;">
                        <button type="button" id="emoji-picker-btn" class="emoji-btn">😀</button>
                    </div>
                    <emoji-picker id="emoji-picker" class="dark"></emoji-picker>
                </div>
                <div class="form-group">
                    <label for="service-name">Name</label>
                    <input type="text" id="service-name" required placeholder="e.g. Dashboard">
                </div>
                <div class="form-group">
                    <label for="service-protocol">Protocol</label>
                    <select id="service-protocol">
                        <option value="http">http</option>
                        <option value="https">https</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="service-port">Port</label>
                    <input type="number" id="service-port" required placeholder="e.g. 80">
                </div>
                <button type="submit" class="submit-btn">Save Service</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
</body>

</html>
